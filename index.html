<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<meta name="description" content="Tomorrow Starts Tonight — set your Top 3 tonight. Win tomorrow."/>
<title>Tomorrow Starts Tonight</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1c1c1c;--bg4:#232323;
  --border:#252525;--border2:#303030;--border3:#3a3a3a;
  --text:#f0f0f0;--text2:#888;--text3:#444;
  --green:#1D9E75;--green-bg:#0c2118;--green-text:#4ecca3;
  --amber:#EF9F27;--amber-bg:#1f1508;
  --red:#E24B4A;--blue:#4F7EF7;--purple:#9B6EF3;
  --r:12px;--rsm:8px;--rlg:16px;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.2rem .75rem;border-bottom:1px solid var(--border);flex-shrink:0}
.brand{font-family:var(--serif);font-size:17px;letter-spacing:-.02em}
.streak-pill{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border3);color:var(--amber);font-size:13px;font-weight:600;padding:5px 12px;border-radius:20px}

/* ── SCROLL AREA ── */
.content{flex:1;overflow-y:auto;padding:1.2rem;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}

/* ── BOTTOM NAV ── */
.bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-size:10px;font-weight:500;font-family:var(--sans);letter-spacing:.03em;transition:color .15s}
.nav-btn.active{color:var(--green-text)}
.nav-icon{font-size:20px;line-height:1}

/* ── TYPOGRAPHY ── */
.serif{font-family:var(--serif)}
.section-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:8px;margin-top:1.4rem;display:block}
.section-lbl:first-child{margin-top:0}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.75rem}

/* ── MODE TOGGLE ── */
.mode-toggle{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:3px;margin-bottom:1.2rem}
.mode-btn{flex:1;padding:9px;font-size:13px;font-weight:500;border:none;background:none;border-radius:var(--rsm);cursor:pointer;color:var(--text3);font-family:var(--sans);transition:all .15s}
.mode-btn.active{background:var(--bg3);color:var(--text);border:1px solid var(--border3)}
.morning-mode{background:#140e02!important}
.morning-mode .topbar{border-bottom-color:#2a1f05!important}
.morning-mode .brand{color:#f0e8d0!important}
.morning-mode .streak-pill{background:#1f1200!important;border-color:#3a2500!important}
.morning-mode .mode-toggle{background:#1c1300!important;border-color:#3a2500!important}
.morning-mode .mode-btn.active{background:#2a1a00!important;color:#f0e8d0!important;border-color:#EF9F27!important}
.morning-mode .section-lbl{color:#7a5520!important}
.morning-mode .task-block{background:#1c1300!important;border-color:#3a2500!important}
.morning-mode .task-block:focus-within{border-color:#EF9F27!important}
.morning-mode .task-num{color:#7a5520!important}
.morning-mode .task-field{color:#f0e8d0!important}
.morning-mode .check-btn{border-color:#3a2500!important}
.morning-mode .check-btn.done{background:#EF9F27!important;border-color:#EF9F27!important}
.morning-mode .task-field.done{color:#6b4f1a!important}
.morning-mode .score-card{background:#1c1300!important;border-color:#3a2500!important}
.morning-mode .score-num{color:#f0e8d0!important}
.morning-mode .score-lbl{color:#7a5520!important}
.morning-mode .score-card.overall{background:#2a1a00!important;border-color:#EF9F27!important}
.morning-mode .score-card.overall .score-num{color:#EF9F27!important}
.morning-mode .score-card.overall .score-lbl{color:#EF9F27!important}
.morning-mode .habit-row{background:#1c1300!important;border-color:#3a2500!important}
.morning-mode .habit-name{color:#f0e8d0!important}
.morning-mode .habit-target{color:#6b4f1a!important}
.morning-mode .habit-tick{border-color:#3a2500!important}
.morning-mode .habit-tick.done{background:#EF9F27!important;border-color:#EF9F27!important}
.morning-mode .bottom-nav{background:#140e02!important;border-top-color:#2a1f05!important}
.morning-mode .nav-btn{color:#6b4f1a!important}
.morning-mode .nav-btn.active{color:#EF9F27!important}
.morning-mode .hint{color:#6b4f1a!important}

/* ── TASKS ── */
.task-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.task-block:focus-within{border-color:var(--border3)}
.task-main{display:flex;align-items:center;gap:10px;padding:13px}
.task-num{font-family:var(--serif);font-size:16px;color:var(--text3);width:18px;flex-shrink:0}
.task-field{flex:1;border:none;background:none;font-size:15px;color:var(--text);outline:none;font-family:var(--sans)}
.task-field::placeholder{color:var(--text3)}
.task-field.done{text-decoration:line-through;color:var(--text3)}
.check-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border3);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:13px;color:transparent}
.check-btn.done{background:var(--green);border-color:var(--green);color:white}
.time-prompt{padding:0 13px 12px 41px;border-top:1px solid var(--border)}
.time-q{font-size:12px;color:var(--text2);margin:10px 0 7px}
.yn-row{display:flex;gap:6px;margin-bottom:8px}
.yn-btn{flex:1;padding:7px;font-size:12px;font-weight:500;border:1px solid var(--border3);border-radius:var(--rsm);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .15s}
.yn-btn.yes{background:var(--green-bg);border-color:var(--green);color:var(--green-text)}
.yn-btn.no{color:var(--text3)}
.time-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--green-text);background:var(--green-bg);padding:3px 10px;border-radius:20px;border:1px solid var(--green);margin-top:6px}
input[type=time]{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--border3);border-radius:var(--rsm);background:var(--bg3);color:var(--text);font-family:var(--sans);outline:none}
input[type=time]:focus{border-color:var(--green)}

/* ── HABITS ── */
.habit-row{display:flex;align-items:center;gap:10px;padding:12px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px}
.habit-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.habit-name{flex:1;font-size:14px}
.habit-target{font-size:12px;color:var(--text3);margin-right:4px}
.habit-tick{width:28px;height:28px;border-radius:var(--rsm);border:1.5px solid var(--border3);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:14px;color:transparent}
.habit-tick.done{background:var(--green);border-color:var(--green);color:white}

/* ── SCORES ── */
.score-row{display:flex;gap:8px;margin-bottom:1rem}
.score-card{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 8px;text-align:center}
.score-num{font-family:var(--serif);font-size:26px}
.score-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-top:2px}
.score-card.overall{background:var(--green-bg);border-color:var(--green)}
.score-card.overall .score-num{color:var(--green-text)}
.score-card.overall .score-lbl{color:var(--green)}

/* ── STREAK ── */
.streak-hero{text-align:center;padding:1.5rem 0 1rem}
.streak-num{font-family:var(--serif);font-size:72px;line-height:1;color:var(--text)}
.streak-lbl{font-size:14px;color:var(--text2);margin-top:4px}
.week-strip{display:flex;gap:5px;margin-bottom:1rem}
.wday{flex:1;text-align:center}
.wday-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:5px}
.wday-dot{width:30px;height:30px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.wd-done{background:var(--green);color:white}
.wd-today{background:var(--text);color:var(--bg)}
.wd-empty{background:var(--bg3);color:var(--text3)}
.milestone-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:1rem}
.milestone-row::-webkit-scrollbar{display:none}
.ms{flex-shrink:0;text-align:center;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);min-width:68px}
.ms.done{border-color:var(--green)}
.ms.next{background:var(--amber-bg);border-color:var(--amber)}
.ms-icon{font-size:18px;margin-bottom:3px}
.ms-days{font-size:13px;font-weight:600}
.ms.next .ms-days{color:var(--amber)}
.ms-lbl{font-size:10px;color:var(--text3)}
.shield-card{display:flex;align-items:center;gap:12px;padding:13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
.shield-badge{font-size:12px;font-weight:600;color:var(--green-text);background:var(--green-bg);padding:3px 10px;border-radius:20px;border:1px solid var(--green)}

/* ── CALENDAR ── */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-month{font-family:var(--serif);font-size:20px}
.cal-arrows{display:flex;gap:5px}
.cal-arr{width:30px;height:30px;border-radius:50%;border:1px solid var(--border3);background:var(--bg2);cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:16px;font-family:var(--sans)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1rem}
.cal-lbl{text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);padding:3px 0 6px}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;cursor:pointer;position:relative;color:var(--text2);user-select:none;transition:background .1s}
.cal-day.other{opacity:.15;cursor:default}
.cal-day.today{border:1.5px solid var(--border3);font-weight:600;color:var(--text)}
.cal-day.past{color:var(--text3)}
.cal-day.future{color:var(--text3);cursor:default}
.cal-day.done{background:var(--green)!important;color:transparent!important}
.cal-day.done::after{content:'X';position:absolute;font-size:14px;font-weight:700;color:white}
.gdots{display:flex;gap:2px;justify-content:center;margin-top:1px}
.gdot{width:4px;height:4px;border-radius:50%}
.cal-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:9px;height:9px;border-radius:50%}

/* ── GOALS ── */
.goal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:8px}
.goal-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.g-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.g-name{font-size:14px;font-weight:500;flex:1}
.g-date{font-size:11px;color:var(--text3)}
.g-rm{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0;line-height:1;font-family:var(--sans);transition:color .15s}
.g-rm:hover{color:var(--red)}
.ptrack{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:6px}
.pfill{height:100%;border-radius:3px;transition:width .4s}
.g-stats{display:flex;justify-content:space-between}
.g-stat{font-size:11px;color:var(--text3)}
.g-stat b{font-weight:500;color:var(--text2)}

/* ── FORM ── */
.form-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:8px}
.form-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px;display:block;margin-top:12px}
.form-lbl:first-child{margin-top:0}
.form-input{width:100%;padding:11px 13px;font-size:15px;border:1px solid var(--border3);border-radius:var(--rsm);background:var(--bg3);color:var(--text);font-family:var(--sans);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--green)}
.form-input::placeholder{color:var(--text3)}
.swatches{display:flex;gap:8px;margin-top:5px}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.swatch.on{border-color:white;transform:scale(1.15)}
.swatch.used{opacity:.25;cursor:not-allowed}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:opacity .15s;margin-top:10px}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.2;cursor:not-allowed}
.btn-ghost{width:100%;padding:11px;background:none;border:1px solid var(--border3);border-radius:var(--r);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;font-family:var(--sans);margin-top:8px;transition:all .15s}
.btn-ghost:hover{border-color:var(--text3);color:var(--text)}
.btn-dashed{width:100%;padding:12px;border:1.5px dashed var(--border3);border-radius:var(--r);background:none;font-size:14px;color:var(--text3);cursor:pointer;font-family:var(--sans);transition:all .15s;margin-top:4px}
.btn-dashed:hover{border-color:var(--green);color:var(--green-text)}

/* ── TOGGLE SWITCH ── */
.toggle-row{display:flex;align-items:center;gap:12px;padding:12px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px}
.toggle-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.toggle-text{flex:1}
.toggle-title{font-size:14px;font-weight:500}
.toggle-sub{font-size:12px;color:var(--text3);margin-top:1px}
.toggle-sw{width:42px;height:24px;border-radius:12px;background:var(--bg3);border:1px solid var(--border3);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-sw.on{background:var(--green);border-color:var(--green)}
.toggle-sw::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:white;transition:left .2s}
.toggle-sw.on::after{left:21px}

/* ── ONBOARDING ── */
.ob-wrap{flex:1;display:flex;flex-direction:column;padding:1.5rem 1.2rem;max-width:430px;margin:0 auto;width:100%;overflow-y:auto}
.ob-progress{display:flex;gap:5px;margin-bottom:2rem}
.ob-seg{flex:1;height:2px;border-radius:1px;background:var(--border3);transition:background .3s}
.ob-seg.done{background:var(--text)}
.ob-headline{font-family:var(--serif);font-size:34px;color:var(--text);line-height:1.2;margin-bottom:10px}
.ob-sub{font-size:15px;color:var(--text2);line-height:1.65;margin-bottom:1.5rem}
.ob-spacer{flex:1;min-height:1rem}
.ob-highlight{color:var(--green-text);font-style:italic}
.goal-opt{display:flex;align-items:center;gap:12px;padding:12px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;cursor:pointer;transition:all .15s}
.goal-opt.sel{border-color:var(--green);background:var(--green-bg)}
.goal-opt-icon{font-size:20px;width:24px;text-align:center;flex-shrink:0}
.goal-opt-text{flex:1}
.goal-opt-name{font-size:14px;font-weight:500}
.goal-opt.sel .goal-opt-name{color:var(--green-text)}
.goal-opt-desc{font-size:12px;color:var(--text3);margin-top:1px}
.tick-circle{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.goal-opt.sel .tick-circle{background:var(--green);border-color:var(--green);color:white}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1rem}
.preset-card{padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s}
.preset-card.sel{border-color:var(--green);background:var(--green-bg)}
.preset-card.disabled{opacity:.3;cursor:not-allowed}
.preset-icon{font-size:18px;margin-bottom:5px}
.preset-name{font-size:13px;font-weight:500}
.preset-card.sel .preset-name{color:var(--green-text)}
.preset-target{font-size:11px;color:var(--text3);margin-top:1px}

/* ── NOTIF / IPHONE BANNER ── */
.notif-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.notif-icon-wrap{width:36px;height:36px;border-radius:var(--rsm);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.notif-body{flex:1}
.notif-app{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:2px}
.notif-title{font-size:13px;font-weight:500}
.notif-msg{font-size:12px;color:var(--text2);margin-top:1px}
.notif-time{font-size:11px;color:var(--text3);flex-shrink:0}
.iphone-banner{background:var(--bg2);border:1px solid var(--border3);border-radius:var(--rlg);padding:1.2rem;margin-bottom:1rem}
.ib-title{font-size:15px;font-weight:600;margin-bottom:5px}
.ib-sub{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:1rem}
.ib-steps{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.ib-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.ib-num{width:22px;height:22px;border-radius:50%;background:var(--bg3);border:1px solid var(--border3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}

/* ── STATS ── */
.stat-bar-row{margin-bottom:14px}
.stat-bar-top{display:flex;justify-content:space-between;margin-bottom:5px}
.stat-bar-name{font-size:13px;color:var(--text2)}
.stat-bar-pct{font-size:12px;color:var(--text3)}
.stat-bar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:3px}

/* ── PRICING ── */
.pricing-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);padding:1.2rem;margin-bottom:10px;position:relative;overflow:hidden}
.pricing-card.featured{border-color:var(--green)}
.pricing-badge{position:absolute;top:12px;right:12px;background:var(--green);color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em}
.pricing-tier{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:5px}
.pricing-price{font-family:var(--serif);font-size:38px;margin-bottom:3px}
.pricing-price small{font-family:var(--sans);font-size:14px;color:var(--text3)}
.pricing-desc{font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.5}

// ── AUTO ROLLOVER ──
function checkDayRollover() {
  const todayStr = new Date().toDateString();
  const lastDate = localStorage.getItem('tst_lastDate');
  
  if (!lastDate) {
    // First time opening — just set the date
    STATE.lastDate = todayStr;
    save();
    return;
  }

  if (lastDate !== todayStr) {
    // New day detected — rollover!
    const yesterday = new Date(lastDate);
    
    // Check if any tasks were completed yesterday
    const completedCount = STATE.tasks.filter(t => t.done).length;
    const allDone = completedCount === 3;
    const noneDone = completedCount === 0;
    
    // Update streak
    if (completedCount > 0) {
      STATE.completedDays.add(yesterday.toDateString());
      STATE.streak = STATE.completedDays.size;
    }

    // Store missed tasks for accountability prompt
    STATE.missedTasks = STATE.tasks.filter(t => !t.done && t.val.trim()).map(t => t.val);

    // Reset tasks for new day
    STATE.tasks = [
      {val:'',hasTime:null,time:'',done:false},
      {val:'',hasTime:null,time:'',done:false},
      {val:'',hasTime:null,time:'',done:false}
    ];

    // Reset habit done states
    STATE.habitDone = {};

    // Switch to evening mode so they set tomorrow's tasks
    STATE.mode = 'evening';

    // Update date
    STATE.lastDate = todayStr;

    // Show rollover notification if they had missed tasks
    STATE.showRollover = STATE.missedTasks && STATE.missedTasks.length > 0;

    save();
  }
}

function fmt12(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  return `${(h % 12) || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
}

function daysLeft(dateStr) {
  return Math.max(0, Math.ceil((new Date(dateStr) - today) / 86400000));
}

// ── STREAK ──
function renderStreak() {
  const todayDay = today.getDay();
  const weekStrip = WDAYS.map((d, i) => {
    const offset = i - (todayDay === 0 ? 6 : todayDay - 1);
    const date = new Date(today); date.setDate(today.getDate() + offset);
    const isToday = date.toDateString() === today.toDateString();
    const isDone = STATE.completedDays.has(date.toDateString());
    const cls = isDone ? 'wd-done' : isToday ? 'wd-today' : 'wd-empty';
    return `<div class="wday"><div class="wday-lbl">${d}</div><div class="wday-dot ${cls}">${isDone ? '✓' : date.getDate()}</div></div>`;
  }).join('');

  const milestones = MILESTONES.map(m => {
    const done = STATE.streak >= m.days, next = !done && STATE.streak >= m.days - 7;
    return `<div class="ms${done?' done':next?' next':''}"><div class="ms-icon">${m.icon}</div><div class="ms-days">${m.days}d</div><div class="ms-lbl">${m.label}</div></div>`;
  }).join('');

  return `
    <div class="streak-hero">
      <div style="font-size:52px;line-height:1;margin-bottom:6px">🔥</div>
      <div class="streak-num">${STATE.streak}</div>
      <div class="streak-lbl">day streak · Best: ${STATE.streak}</div>
    </div>
    <span class="section-lbl">This week</span>
    <div class="week-strip">${weekStrip}</div>
    <span class="section-lbl">Milestones</span>
    <div class="milestone-row">${milestones}</div>
    <span class="section-lbl">Streak shield</span>
    <div class="shield-card">
      <span style="font-size:26px">🛡️</span>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500;margin-bottom:2px">Free pass</div>
        <div style="font-size:12px;color:var(--text3)">Miss one day without breaking your streak</div>
      </div>
      <span class="shield-badge">1 left</span>
    </div>
  `;
}

function renderCalendar() {
  const usedColors = STATE.goals.map(g => g.color);
  const nextColor = COLORS.find(c => !usedColors.includes(c)) || COLORS[0];

  const goalCards = STATE.goals.length ? STATE.goals.map((g, i) => {
    const dl = daysLeft(g.date);
    const total = Math.max(STATE.completedDays.size + dl, 1);
    const pct = Math.min(100, Math.round(STATE.completedDays.size / total * 100));
    const ds = new Date(g.date).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
    return `<div class="goal-card">
      <div class="goal-top">
        <div class="g-dot" style="background:${g.color}"></div>
        <div class="g-name">${g.name}</div>
        <div class="g-date">${ds}</div>
        <button class="g-rm" onclick="removeGoal(${i})">✕</button>
      </div>
      <div class="ptrack"><div class="pfill" style="width:${pct}%;background:${g.color}"></div></div>
      <div class="g-stats">
        <div class="g-stat"><b>${STATE.completedDays.size}</b> logged</div>
        <div class="g-stat"><b>${dl}</b> days left</div>
        <div class="g-stat"><b>${pct}%</b> there</div>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state"><div style="font-size:28px;margin-bottom:6px">🎯</div><div>No goals yet — add one below</div></div>`;

  const goalForm = STATE.showGoalForm ? `
    <div class="form-box">
      <label class="form-lbl">Goal name</label>
      <input class="form-input" id="gName" placeholder="e.g. Lose 10kg, Save £2,000..." maxlength="32"/>
      <label class="form-lbl">Target date</label>
      <input class="form-input" type="date" id="gDate"/>
      <label class="form-lbl">Colour</label>
      <div class="swatches">
        ${COLORS.map(c => `<div class="swatch${STATE.goalSelColor===c?' on':''}${usedColors.includes(c)?' used':''}" style="background:${c}" onclick="pickGoalColor('${c}',${usedColors.includes(c)})"></div>`).join('')}
      </div>
    </div>
    <button class="btn-primary" onclick="addGoal()">Add goal</button>
    <button class="btn-ghost" onclick="cancelGoalForm()">Cancel</button>
  ` : STATE.goals.length < 3 ? `<button class="btn-dashed" onclick="showGoalForm()">+ Add a goal (${STATE.goals.length}/3)</button>` :
    `<p class="hint">Maximum 3 goals — remove one to add another</p>`;

  // Calendar
  const yr = STATE.viewMonth.getFullYear(), mo = STATE.viewMonth.getMonth();
  const legend = STATE.goals.map(g => `<div class="leg"><div class="leg-dot" style="background:${g.color}"></div>${g.name}</div>`).join('') +
    (STATE.completedDays.size ? `<div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Completed</div>` : '');

  const first = new Date(yr,mo,1).getDay(), dim = new Date(yr,mo+1,0).getDate(), prev = new Date(yr,mo,0).getDate();
  let cells = CLBLS.map(l => `<div class="cal-lbl">${l}</div>`).join('');
  for (let i=0;i<first;i++) cells += `<div class="cal-day other">${prev-first+1+i}</div>`;
  for (let d=1;d<=dim;d++) {
    const date = new Date(yr,mo,d), ds = date.toDateString();
    const isT = ds===today.toDateString(), isDone = STATE.completedDays.has(ds);
    const isPast = date<today&&!isT, isFut = date>today;
    const targets = STATE.goals.filter(g=>new Date(g.date).toDateString()===ds);
    const active = STATE.goals.filter(g=>date<=new Date(g.date)&&date>today);
    let cls='cal-day';
    if(isDone)cls+=' done'; else if(isT)cls+=' today'; else if(isFut)cls+=' future'; else if(isPast)cls+=' past';
    const bg=isDone?'':targets.length?targets[0].color+'22':'';
    const bdr=targets.length&&!isDone?`border:2px solid ${targets[0].color}`:'';
    const activeDots=!isDone&&active.length?`<div class="gdots">${active.map(g=>`<div class="gdot" style="background:${g.color};opacity:.6"></div>`).join('')}</div>`:'';
    const targetDots=targets.length&&!isDone?`<div class="gdots">${targets.map(g=>`<div class="gdot" style="background:${g.color}"></div>`).join('')}</div>`:'';
    cells+=`<div class="${cls}" style="${bg?'background:'+bg+';':''}${bdr}" onclick="toggleDay('${ds}',${isFut})">${isDone?'':d}${targetDots||activeDots}</div>`;
  }
  const rem=42-first-dim; for(let d=1;d<=rem;d++) cells+=`<div class="cal-day other">${d}</div>`;

  return `
    <span class="section-lbl">Your goals</span>
    ${goalCards}
    ${goalForm}
    <div class="divider"></div>
    <div class="cal-legend">${legend}</div>
    <div class="cal-nav-row">
      <div class="cal-month">${MONTHS[mo]} ${yr}</div>
      <div class="cal-arrows">
        <button class="cal-arr" onclick="changeMonth(-1)">‹</button>
        <button class="cal-arr" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid">${cells}</div>
    <p class="hint">Tap any past day to mark complete — all goals move forward</p>
  `;
}

// ── SUPABASE SYNC ──
async function syncToSupabase() {
  if (!STATE.user || !STATE.user.email) return;
  try {
    const { error } = await _supabase
      .from('user_data')
      .upsert({
        email: STATE.user.email,
        name: STATE.user.name,
        plan: STATE.user.plan || 'free',
        tasks: JSON.stringify(STATE.tasks),
        habits: JSON.stringify(STATE.habits),
        habit_done: JSON.stringify(STATE.habitDone),
        streak: STATE.streak,
        completed_days: JSON.stringify([...STATE.completedDays]),
        goals: JSON.stringify(STATE.goals),
        toggles: JSON.stringify(STATE.toggles),
        last_date: STATE.lastDate,
        updated_at: new Date().toISOString()
      }, { onConflict: 'email' });
    if (error) console.log('Sync error:', error.message);
  } catch(e) { console.log('Supabase error:', e); }
}

async function loadFromSupabase(email) {
  try {
    const { data, error } = await _supabase
      .from('user_data')
      .select('*')
      .eq('email', email)
      .single();
    if (error || !data) return false;
    STATE.user = { name: data.name, email: data.email, plan: data.plan };
    STATE.tasks = JSON.parse(data.tasks || '[]') || STATE.tasks;
    STATE.habits = JSON.parse(data.habits || '[]') || STATE.habits;
    STATE.habitDone = JSON.parse(data.habit_done || '{}') || STATE.habitDone;
    STATE.streak = data.streak || 0;
    STATE.completedDays = new Set(JSON.parse(data.completed_days || '[]'));
    STATE.goals = JSON.parse(data.goals || '[]') || STATE.goals;
    STATE.toggles = JSON.parse(data.toggles || '[true,true,true,true]');
    STATE.lastDate = data.last_date || new Date().toDateString();
    save();
    return true;
  } catch(e) { console.log('Load error:', e); return false; }
}

// Override save to also sync to Supabase
const _originalSave = save;
function save() {
  _originalSave();
  syncToSupabase();
}
